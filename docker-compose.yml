version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airpull_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: airpull_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: airpull_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: